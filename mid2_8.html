<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>씨유에탑 ✦ 영어단어장</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2563EB;
      --primary-dark: #1D4ED8;
      --primary-light: #EFF6FF;
      --success: #10B981;
      --danger: #EF4444;
      --warn: #F59E0B;
      --gray: #6B7280;
      --border: #E5E7EB;
      --bg: #F9FAFB;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }
    .app-container {
      width: 100%;
      max-width: 420px;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
    header {
      background: white;
      padding: 16px;
      border-bottom: 1px solid var(--border);
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 4px;
    }
    header p {
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      color: var(--gray);
    }
    .tabs {
      display: flex;
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 61px;
      z-index: 100;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      border: none;
      background: none;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray);
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 700;
    }
    .tab-content {
      flex: 1;
      display: none;
      padding: 16px;
    }
    .tab-content.active { display: flex; flex-direction: column; }
    
    /* Range Selector */
    .range-container {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
      scrollbar-width: none;
    }
    .range-container::-webkit-scrollbar { display: none; }
    .chip {
      padding: 6px 14px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      white-space: nowrap;
      cursor: pointer;
      color: #374151;
      font-family: 'Nunito', 'Noto Sans KR', sans-serif;
    }
    .chip.active {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    /* Filters & Search */
    .search-box {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .filter-container {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }
    .filter-btn {
      flex: 1;
      padding: 8px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .filter-btn.active {
      background: var(--primary-light);
      color: var(--primary);
      border-color: var(--primary);
      font-weight: 600;
    }

    /* Word Cards */
    .word-list { display: flex; flex-direction: column; gap: 12px; }
    .word-card {
      background: white;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid var(--border);
      position: relative;
      transition: opacity 0.2s;
    }
    .word-card.known { opacity: 0.4; }
    .card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .check-btn, .fav-btn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
    }
    .word-text { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 700; color: #111827; }
    .pos-badge {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      color: white;
      font-family: 'Nunito', sans-serif;
    }
    .pos-n { background: #3B82F6; }
    .pos-v { background: #10B981; }
    .pos-a { background: #F59E0B; }
    .pos-ad { background: #EC4899; }
    .pos-prep { background: #8B5CF6; }
    .pos-conj { background: #EF4444; }
    .tts-btn { background: none; border: none; font-size: 16px; cursor: pointer; margin-left: auto; margin-right: 4px; }
    .phonetic { font-family: 'Nunito', sans-serif; font-size: 13px; color: var(--gray); margin-bottom: 4px; }
    .meaning { font-size: 15px; color: #374151; font-weight: 500; }

    /* Flashcard */
    .fc-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .fc-counter { font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--gray); }
    .fc-card {
      width: 100%;
      height: 240px;
      background: white;
      border-radius: 16px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      cursor: pointer;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }
    .fc-fav { position: absolute; top: 16px; right: 16px; background: none; border: none; font-size: 22px; cursor: pointer; }
    .fc-word { font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 800; color: #111827; margin-bottom: 8px; }
    .fc-phonetic { font-family: 'Nunito', sans-serif; font-size: 15px; color: var(--gray); margin-bottom: 12px; }
    .fc-meaning { font-size: 20px; color: var(--primary); font-weight: 700; display: none; }
    .fc-card.flipped .fc-meaning { display: block; }
    .fc-hint { font-size: 12px; color: #9CA3AF; position: absolute; bottom: 16px; }
    .fc-nav { display: flex; width: 100%; gap: 10px; margin-top: auto; }
    .fc-nav-btn {
      flex: 1;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .fc-nav-btn.secondary { background: white; border: 1px solid var(--border); color: #374151; }

    /* Quiz */
    .quiz-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 20px; text-align: center; }
    .quiz-btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .quiz-card { width: 100%; background: white; padding: 24px; border-radius: 12px; border: 1px solid var(--border); text-align: center; margin-bottom: 16px; }
    .quiz-word { font-family: 'Nunito', sans-serif; font-size: 26px; font-weight: 700; }
    .quiz-options { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .option-btn {
      width: 100%;
      padding: 14px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-align: left;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option-btn.correct { background: var(--success) !important; color: white; border-color: var(--success); }
    .option-btn.wrong { background: var(--danger) !important; color: white; border-color: var(--danger); }
    
    /* Test Mode */
    .test-input-group { width: 100%; display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .test-input-group label { font-size: 14px; font-weight: 600; color: #374151; }
    .test-input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; }
    .progress-container { width: 100%; background: var(--border); height: 6px; border-radius: 3px; margin-bottom: 12px; overflow: hidden; }
    .progress-bar { background: var(--primary); height: 100%; width: 0%; transition: width 0.2s; }
    .test-stats { display: flex; justify-content: space-between; font-size: 13px; color: var(--gray); margin-bottom: 16px; font-family: 'Nunito', sans-serif; }
    .test-card { background: white; padding: 30px 16px; border-radius: 12px; border: 1px solid var(--border); text-align: center; margin-bottom: 20px; }
    .test-word { font-family: 'Nunito', sans-serif; font-size: 28px; font-weight: 800; color: #111827; margin-bottom: 6px; }
    .test-phonetic { font-family: 'Nunito', sans-serif; font-size: 14px; color: var(--gray); }
    .test-result-box { background: white; border-radius: 12px; border: 1px solid var(--border); padding: 16px; margin-top: 16px; max-height: 200px; overflow-y: auto; }
    .result-item { font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border); }
    .result-item:last-child { border-bottom: none; }
  </style>
</head>
<body>

<div class="app-container">
  <header>
    <h1>씨유에탑 ✦ 영어단어장</h1>
    <p id="sub-header">씨유에탑 중등2-8 · 총 1000단어</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab(1)">단어목록</button>
    <button class="tab-btn" onclick="switchTab(2)">플래시카드</button>
    <button class="tab-btn" onclick="switchTab(3)">퀴즈모드</button>
    <button class="tab-btn" onclick="switchTab(4)">📝테스트</button>
  </div>

  <!-- Tab 1: List -->
  <div id="tab1" class="tab-content active">
    <div class="range-container" id="list-ranges"></div>
    <input type="text" class="search-box" id="search-input" placeholder="영어 또는 한글 검색..." oninput="renderList()">
    <div class="filter-container">
      <button class="filter-btn active" id="f-all" onclick="setFilter('all')">전체</button>
      <button class="filter-btn" id="f-unknown" onclick="setFilter('unknown')">모름</button>
      <button class="filter-btn" id="f-fav" onclick="setFilter('fav')">⭐즐겨찾기</button>
    </div>
    <div class="word-list" id="word-list-container"></div>
  </div>

  <!-- Tab 2: Flashcard -->
  <div id="tab2" class="tab-content">
    <div class="range-container" id="fc-ranges"></div>
    <div class="fc-container">
      <div class="fc-counter" id="fc-count">0 / 0</div>
      <div class="fc-card" id="fc-main-card" onclick="flipFcCard()">
        <button class="fc-fav" onclick="toggleFcFav(event)" id="fc-fav-icon">☆</button>
        <div class="fc-word" id="fc-word">-</div>
        <div class="fc-phonetic" id="fc-phonetic">[]</div>
        <div class="fc-meaning" id="fc-meaning">-</div>
        <div class="fc-hint">탭하여 뜻 보기</div>
      </div>
      <div class="fc-nav">
        <button class="fc-nav-btn secondary" onclick="fcPrev()">◀ 이전</button>
        <button class="fc-nav-btn" style="background:var(--warn);padding:12px 16px;" onclick="speak(document.getElementById('fc-word').textContent)">🔊</button>
        <button class="fc-nav-btn" onclick="fcNext()">다음 ▶</button>
      </div>
    </div>
  </div>

  <!-- Tab 3: Quiz -->
  <div id="tab3" class="tab-content">
    <div class="quiz-screen" id="quiz-start-screen">
      <h2>4지선다 퀴즈</h2>
      <p>전체 범위에서 랜덤하게 10문제가 출제됩니다.</p>
      <button class="quiz-btn" onclick="startQuiz()">퀴즈 시작</button>
    </div>
    <div class="quiz-screen" id="quiz-play-screen" style="display:none; justify-content: flex-start;">
      <div class="fc-counter" id="quiz-count">문제 1 / 10</div>
      <div class="quiz-card">
        <div class="quiz-word" id="quiz-question-word">-</div>
      </div>
      <div class="quiz-options" id="quiz-options-container"></div>
    </div>
    <div class="quiz-screen" id="quiz-result-screen" style="display:none;">
      <h2 id="quiz-result-title">결과</h2>
      <div style="font-size: 48px;" id="quiz-result-emoji">🏆</div>
      <p style="font-size: 18px; font-weight: 700;" id="quiz-result-score">0 / 10</p>
      <button class="quiz-btn" onclick="showQuizScreen('start')">다시 풀기</button>
    </div>
  </div>

  <!-- Tab 4: Test -->
  <div id="tab4" class="tab-content">
    <div id="test-setup-screen" class="quiz-screen" style="justify-content: flex-start;">
      <h2 style="margin-bottom: 16px;">📝 단어 테스트 설정</h2>
      <div class="test-input-group">
        <label>이름 입력 (필수)</label>
        <input type="text" id="test-name" class="test-input" placeholder="이름을 입력하세요">
      </div>
      <div class="test-input-group">
        <label>문항 수</label>
        <input type="text" class="test-input" value="50문제 고정" disabled>
      </div>
      <div class="test-input-group">
        <label>범위 선택</label>
        <select id="test-range-select" class="test-input"></select>
      </div>
      <button class="quiz-btn" style="margin-top: 12px;" onclick="startTest()">테스트 시작</button>
    </div>

    <div id="test-play-screen" style="display:none; flex-direction: column; flex: 1;">
      <div class="progress-container"><div class="progress-bar" id="test-progress"></div></div>
      <div class="test-stats">
        <span id="test-counter">1 / 50</span>
        <span id="test-correct-counter" style="color: var(--success); font-weight: 600;">✅ 0개 정답</span>
      </div>
      <div class="test-card">
        <div class="test-word" id="test-q-word">-</div>
        <div class="test-phonetic" id="test-q-phonetic">[]</div>
      </div>
      <input type="text" id="test-answer-input" class="test-input" placeholder="한글 뜻을 입력하고 Enter" onkeydown="if(event.key==='Enter') submitTestAnswer()">
    </div>

    <div id="test-result-screen" style="display:none; flex-direction: column; flex: 1;">
      <h2 style="text-align:center; margin-bottom: 8px;">테스트 결과</h2>
      <div style="text-align:center; font-size: 48px; margin-bottom: 4px;" id="test-res-emoji">🏆</div>
      <h3 style="text-align:center; color: var(--primary); margin-bottom: 16px;" id="test-res-score">0 / 50 (0점)</h3>
      
      <h4 style="font-size: 14px; color: var(--danger);">❌ 틀린 단어</h4>
      <div class="test-result-box" id="test-wrong-list"></div>
      
      <h4 style="font-size: 14px; color: var(--success); margin-top: 12px;">✅ 맞은 단어</h4>
      <div class="test-result-box" id="test-correct-list" style="color: var(--gray);"></div>

      <button class="quiz-btn" style="background:#25D366; margin-top: 16px;" onclick="copyKakaoResult()">📋 카톡으로 결과 복사</button>
      <button class="quiz-btn" style="background:var(--gray); margin-top: 8px;" onclick="resetTest()">↩ 다시 테스트</button>
    </div>
  </div>
</div>

  // App Initialization
  window.onload = function() {
    document.getElementById('sub-header').textContent = `${SERIES} · 총 ${WORDS.length}단어`;
    initRanges();
    renderList();
    initFcMode();
    initTestSetup();
  };

  function initRanges() {
    const listRangeContainer = document.getElementById('list-ranges');
    const fcRangeContainer = document.getElementById('fc-ranges');
    
    listRangeContainer.innerHTML = '';
    fcRangeContainer.innerHTML = '';

    RANGES.forEach((r, idx) => {
      // Tab 1 Chips
      const chip1 = document.createElement('div');
      chip1.className = `chip ${idx === 0 ? 'active' : ''}`;
      chip1.textContent = r.label;
      chip1.onclick = () => {
        document.querySelectorAll('#list-ranges .chip').forEach(c => c.classList.remove('active'));
        chip1.classList.add('active');
        currentListRange = r;
        renderList();
      };
      listRangeContainer.appendChild(chip1);

      // Tab 2 Chips (Skip "전체" for optimal flashcard learning experience)
      if (idx > 0) {
        const chip2 = document.createElement('div');
        chip2.className = `chip ${idx === 1 ? 'active' : ''}`;
        chip2.textContent = r.label;
        chip2.onclick = () => {
          document.querySelectorAll('#fc-ranges .chip').forEach(c => c.classList.remove('active'));
          chip2.classList.add('active');
          currentFcRange = r;
          initFcMode();
        };
        fcRangeContainer.appendChild(chip2);
      }
    });
  }

  function switchTab(tabNum) {
    currentTab = tabNum;
    document.querySelectorAll('.tab-btn').forEach((btn, idx) => {
      btn.classList.toggle('active', idx + 1 === tabNum);
    });
    document.querySelectorAll('.tab-content').forEach((content, idx) => {
      content.classList.toggle('active', idx + 1 === tabNum);
    });
    if (tabNum === 2) initFcMode();
  }

  // Tab 1: Word List Logic
  function setFilter(filterType) {
    currentFilter = filterType;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    if (filterType === 'all') document.getElementById('f-all').classList.add('active');
    if (filterType === 'unknown') document.getElementById('f-unknown').classList.add('active');
    if (filterType === 'fav') document.getElementById('f-fav').classList.add('active');
    renderList();
  }

  function renderList() {
    const container = document.getElementById('word-list-container');
    container.innerHTML = '';
    
    const searchVal = document.getElementById('search-input').value.toLowerCase();
    const sliceOfWords = WORDS.slice(currentListRange.start, currentListRange.end);

    sliceOfWords.forEach(w => {
      const key = getKey(w);
      const state = userData[key] || { status: "", fav: false };
      
      // Filter & Search Logic
      if (currentFilter === 'unknown' && state.status === 'known') return;
      if (currentFilter === 'fav' && !state.fav) return;
      
      if (searchVal && !w.word.toLowerCase().includes(searchVal) && !w.meaning.toLowerCase().includes(searchVal)) {
        return;
      }

      const card = document.createElement('div');
      card.className = `word-card ${state.status === 'known' ? 'known' : ''}`;
      card.innerHTML = `
        <div class="card-top">
          <button class="check-btn" onclick="toggleKnown('${w.word}', '${w.meaning}', this)">${state.status === 'known' ? '✅' : '⬜'}</button>
          <span class="word-text">${w.word}</span>
          <span class="pos-badge pos-${w.pos}">${w.pos}</span>
          <button class="tts-btn" onclick="speak('${w.word}')">🔊</button>
          <button class="fav-btn" onclick="toggleFav('${w.word}', '${w.meaning}', this)">${state.fav ? '⭐' : '☆'}</button>
        </div>
        <div class="phonetic">${w.phonetic || '[]'}</div>
        <div class="meaning">${w.meaning}</div>
      `;
      container.appendChild(card);
    });
  }

  function toggleKnown(word, meaning, btn) {
    const key = word + '|' + meaning;
    if (!userData[key]) userData[key] = { status: "", fav: false };
    userData[key].status = userData[key].status === 'known' ? '' : 'known';
    saveUserData();
    btn.closest('.word-card').classList.toggle('known', userData[key].status === 'known');
    btn.textContent = userData[key].status === 'known' ? '✅' : '⬜';
  }

  function toggleFav(word, meaning, btn) {
    const key = word + '|' + meaning;
    if (!userData[key]) userData[key] = { status: "", fav: false };
    userData[key].fav = !userData[key].fav;
    saveUserData();
    btn.textContent = userData[key].fav ? '⭐' : '☆';
  }

  // Tab 2: Flashcard Logic
  function initFcMode() {
    fcFilteredWords = WORDS.slice(currentFcRange.start, currentFcRange.end);
    fcIndex = 0;
    showFcCard();
  }

  function showFcCard() {
    if (fcFilteredWords.length === 0) return;
    const w = fcFilteredWords[fcIndex];
    const key = getKey(w);
    const state = userData[key] || { status: "", fav: false };

    document.getElementById('fc-count').textContent = `${fcIndex + 1} / ${fcFilteredWords.length}`;
    document.getElementById('fc-word').textContent = w.word;
    document.getElementById('fc-phonetic').textContent = w.phonetic || '[]';
    document.getElementById('fc-meaning').textContent = w.meaning;
    document.getElementById('fc-fav-icon').textContent = state.fav ? '⭐' : '☆';
    document.getElementById('fc-main-card').classList.remove('flipped');
  }

  function flipFcCard() {
    const card = document.getElementById('fc-main-card');
    if (!card.classList.contains('flipped')) {
      card.classList.add('flipped');
      speak(document.getElementById('fc-word').textContent);
    } else {
      card.classList.remove('flipped');
    }
  }

  function toggleFcFav(e) {
    e.stopPropagation();
    if (fcFilteredWords.length === 0) return;
    const w = fcFilteredWords[fcIndex];
    const key = getKey(w);
    if (!userData[key]) userData[key] = { status: "", fav: false };
    userData[key].fav = !userData[key].fav;
    saveUserData();
    document.getElementById('fc-fav-icon').textContent = userData[key].fav ? '⭐' : '☆';
  }

  function fcPrev() {
    if (fcIndex > 0) { fcIndex--; showFcCard(); }
  }

  function fcNext() {
    if (fcIndex < fcFilteredWords.length - 1) { fcIndex++; showFcCard(); }
  }

  // Tab 3: Quiz Logic
  function showQuizScreen(screenName) {
    document.getElementById('quiz-start-screen').style.display = screenName === 'start' ? 'flex' : 'none';
    document.getElementById('quiz-play-screen').style.display = screenName === 'play' ? 'flex' : 'none';
    document.getElementById('quiz-result-screen').style.display = screenName === 'result' ? 'flex' : 'none';
  }

  function startQuiz() {
    quizWords = [...WORDS].sort(() => 0.5 - Math.random()).slice(0, 10);
    quizCurrentIndex = 0;
    quizScore = 0;
    showQuizScreen('play');
    nextQuizQuestion();
  }

  function nextQuizQuestion() {
    if (quizCurrentIndex >= 10) {
      showQuizResult();
      return;
    }
    document.getElementById('quiz-count').textContent = `문제 ${quizCurrentIndex + 1} / 10`;
    const currentQ = quizWords[quizCurrentIndex];
    document.getElementById('quiz-question-word').textContent = currentQ.word;

    // Create 4 Options
    let options = [currentQ.meaning];
    while (options.length < 4) {
      const randW = WORDS[Math.floor(Math.random() * WORDS.length)].meaning;
      if (!options.includes(randW)) options.push(randW);
    }
    options.sort(() => 0.5 - Math.random());

    const container = document.getElementById('quiz-options-container');
    container.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = opt;
      btn.onclick = () => selectQuizOption(btn, opt, currentQ.meaning, currentQ.word);
      container.appendChild(btn);
    });
  }

  function selectQuizOption(btn, selected, correct, word) {
    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(b => b.disabled = true);

    if (selected === correct) {
      btn.classList.add('correct');
      quizScore++;
      speak(word);
    } else {
      btn.classList.add('wrong');
      buttons.forEach(b => {
        if (b.textContent === correct) b.classList.add('correct');
      });
    }

    setTimeout(() => {
      quizCurrentIndex++;
      nextQuizQuestion();
    }, 1200);
  }

  function showQuizResult() {
    showQuizScreen('result');
    document.getElementById('quiz-result-score').textContent = `${quizScore} / 10 문제 정답`;
    let emoji = '💪';
    let comment = '조금 더 노력해봐요!';
    if (quizScore === 10) { emoji = '🏆'; comment = '완벽합니다!'; }
    else if (quizScore >= 8) { emoji = '🎉'; comment = '훌륭한 실력이에요!'; }
    else if (quizScore >= 6) { emoji = '👍'; comment = '통과입니다!'; }
    
    document.getElementById('quiz-result-emoji').textContent = emoji;
    document.getElementById('quiz-result-title').textContent = comment;
  }

  // Tab 4: Test Logic
  function initTestSetup() {
    const select = document.getElementById('test-range-select');
    select.innerHTML = '';
    RANGES.forEach(r => {
      const opt = document.createElement('option');
      opt.value = r.label;
      opt.textContent = r.label;
      select.appendChild(opt);
    });
  }

  function isSimilar(input, correct) {
    const normalize = s => s.replace(/\s/g,'').replace(/[~\-·,]/g,'').toLowerCase();
    const a = normalize(input), c = normalize(correct);
    if (a === c) return true;
    if (a.length >= 2 && c.includes(a)) return true;
    const core = c.replace(/하다|되다|시키다|이다/g,'').trim();
    if (core.length >= 2 && a.includes(core)) return true;
    return false;
  }

  function startTest() {
    const name = document.getElementById('test-name').value.trim();
    if (!name) {
      alert('이름을 입력해야 테스트를 진행할 수 있습니다.');
      return;
    }

    const selectedLabel = document.getElementById('test-range-select').value;
    const rangeObj = RANGES.find(r => r.label === selectedLabel);
    const pool = WORDS.slice(rangeObj.start, rangeObj.end);

    // Fully Random 50 Extract
    testWords = [...pool].sort(() => 0.5 - Math.random()).slice(0, 50);
    testCurrentIndex = 0;
    testCorrectCount = 0;
    testWrongList = [];
    testCorrectList = [];

    document.getElementById('test-setup-screen').style.display = 'none';
    document.getElementById('test-play-screen').style.display = 'flex';
    document.getElementById('test-result-screen').style.display = 'none';

    nextTestQuestion();
  }

  function nextTestQuestion() {
    if (testCurrentIndex >= testWords.length || testCurrentIndex >= 50) {
      showTestResult();
      return;
    }

    const pct = (testCurrentIndex / 50) * 100;
    document.getElementById('test-progress').style.style = `width: ${pct}%`;
    document.getElementById('test-counter').textContent = `${testCurrentIndex + 1} / 50`;
    document.getElementById('test-correct-counter').textContent = `✅ ${testCorrectCount}개 정답`;

    const q = testWords[testCurrentIndex];
    document.getElementById('test-q-word').textContent = q.word;
    document.getElementById('test-q-phonetic').textContent = q.phonetic || '[]';

    const inputField = document.getElementById('test-answer-input');
    inputField.value = '';
    inputField.focus();

    setTimeout(() => { speak(q.word); }, 200);
  }

  function submitTestAnswer() {
    const inputField = document.getElementById('test-answer-input');
    const ans = inputField.value.trim();
    const q = testWords[testCurrentIndex];

    if (isSimilar(ans, q.meaning)) {
      testCorrectCount++;
      testCorrectList.push(q.word);
    } else {
      testWrongList.push({ word: q.word, input: ans || '없음', correct: q.meaning });
    }

    testCurrentIndex++;
    nextTestQuestion();
  }

  function showTestResult() {
    document.getElementById('test-play-screen').style.display = 'none';
    document.getElementById('test-result-screen').style.display = 'flex';

    const scorePct = Math.round((testCorrectCount / 50) * 100);
    document.getElementById('test-res-score').textContent = `${testCorrectCount} / 50 (${scorePct}점)`;

    let emoji = '💪';
    if (scorePct === 100) emoji = '🏆';
    else if (scorePct >= 80) emoji = '🎉';
    else if (scorePct >= 60) emoji = '👍';
    document.getElementById('test-res-emoji').textContent = emoji;

    // Render lists
    const wrongBox = document.getElementById('test-wrong-list');
    wrongBox.innerHTML = testWrongList.length === 0 ? '<p style="color:var(--gray)">틀린 단어가 없습니다!</p>' : '';
    testWrongList.forEach(w => {
      wrongBox.innerHTML += `<div class="result-item"><strong>${w.word}</strong> → 입력: <span style="color:var(--danger)">${w.input}</span> / 정답: <span style="color:var(--success)">${w.correct}</span></div>`;
    });

    const correctBox = document.getElementById('test-correct-list');
    correctBox.textContent = testCorrectList.join(', ') || '없음';
  }

  function copyKakaoResult() {
    const name = document.getElementById('test-name').value.trim();
    const scorePct = Math.round((testCorrectCount / 50) * 100);
    
    let wrongText = '';
    testWrongList.forEach(w => {
      wrongText += `  ${w.word} → 입력:${w.input} / 정답:${w.correct}\n`;
    });
    if(!wrongText) wrongText = '  없음 ✨\n';

    const text = `[씨유에탑 ${SERIES}] 테스트 결과
날짜: 2026. 6. 30.
이름: ${name}
점수: ${testCorrectCount}/50 (${scorePct}점)
─────────────────
❌ 틀린 단어 (${testWrongList.length}개)
${wrongText}─────────────────
✅ 맞은 단어: ${testCorrectList.join(', ') || '없음'}`;

    navigator.clipboard.writeText(text).then(() => {
      alert('테스트 결과가 클립보드에 복사되었습니다. 카카오톡에 붙여넣기 하세요!');
    });
  }

  function resetTest() {
    document.getElementById('test-setup-screen').style.display = 'flex';
    document.getElementById('test-play-screen').style.display = 'none';
    document.getElementById('test-result-screen').style.display = 'none';
  }

  function speak(text) {
    if (!('speechSynthesis' in window)) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    u.rate = 0.85;
    window.speechSynthesis.speak(u);
  }
</script>

</body>
